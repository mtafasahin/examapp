<app-section-header class="section-container" title="Calisma Sayfalari" icon="/icons/18.svg"></app-section-header>

<div class="list-container">
  <!-- Filters Section -->
  <section class="filters-section">
    <div class="form-container align-center">
      <div class="form-column-3">
        <mat-form-field appearance="outline" class="search-field">
          <mat-label>Baslik veya aciklama ara</mat-label>
          <input matInput [formControl]="searchControl" (keyup.enter)="onSearch()" />
          <button mat-icon-button matSuffix (click)="onSearch()">
            <mat-icon>search</mat-icon>
          </button>
        </mat-form-field>
      </div>
      <div class="form-column">
        <mat-form-field appearance="outline" class="filter-field">
          <mat-label>Ders filtrele</mat-label>
          <mat-select [value]="selectedSubjectId()" (selectionChange)="onSubjectChange($event.value)">
            <mat-option [value]="null">Tum Dersler</mat-option>
            <mat-option *ngFor="let subject of subjectsSignal()" [value]="subject.id">
              {{ subject.name }}
            </mat-option>
          </mat-select>
        </mat-form-field>
      </div>
      <div class="form-column actions">
        <button mat-flat-button color="primary" (click)="onNewPage()">
          <mat-icon>library_add</mat-icon>
          Yeni Ekle
        </button>
      </div>
    </div>
  </section>

  <!-- Cards Section -->
  <section class="cards-section">
    <div class="cards-grid">
      <div *ngFor="let page of pagedStudyPagesSignal().items; trackBy: trackByPage" class="course-card">
        <div class="sp-card-image">
          <img *ngIf="page.coverImageUrl" [src]="page.coverImageUrl" [alt]="page.title" class="cover-image">
          <div class="image-placeholder" *ngIf="!page.coverImageUrl">
            <mat-icon>auto_stories</mat-icon>
            <span>Çalışma Sayfası</span>
          </div>
          
          <!-- Badge System -->
          <!-- <div class="badge trending" *ngIf="page.imageCount >= 10">Kapsamlı</div> -->
          <!-- <div class="badge best-rated" *ngIf="page.isPublished && page.imageCount >= 5">Yayında</div> -->
          <div class="badge newly-launched" *ngIf="isRecentlyCreated(page.createTime)">Yeni</div>
          
          <!-- Action Menu -->
          <!-- <div class="card-actions">
            <button
              mat-icon-button
              [matMenuTriggerFor]="pageMenu"
              (click)="$event.stopPropagation()"
              [disabled]="deletingId() === page.id"
              class="action-button"
            >
              <mat-icon *ngIf="deletingId() !== page.id">more_vert</mat-icon>
              <mat-icon *ngIf="deletingId() === page.id" class="loading-icon">hourglass_empty</mat-icon>
            </button>
            <mat-menu #pageMenu="matMenu">
              <button mat-menu-item (click)="onEdit(page)">
                <mat-icon>edit</mat-icon>
                <span>Düzenle</span>
              </button>
              <button mat-menu-item (click)="onDelete(page)">
                <mat-icon>delete</mat-icon>
                <span>Sil</span>
              </button>
            </mat-menu>
          </div> -->
        </div>
        
        <div class="card-content">
          <h3 class="card-title">{{ page.title }}</h3>
          
          <!-- Rating/Status Display -->
          <div class="card-rating">
            <div class="stars">
              <mat-icon *ngFor="let star of [1,2,3,4,5]; let i = index" 
                       [class.filled]="i < getStarRating(page)"
                       class="star">star</mat-icon>
            </div>
            <!-- <span class="rating-score">{{ getRatingScore(page) }}</span>
            <span class="review-count">({{ page.imageCount }} sayfa)</span> -->
          </div>
          
          <!-- Price/Status -->
          <!-- <div class="card-price">
            <span class="current-price">{{ page.isPublished ? 'Aktif' : 'Taslak' }}</span>
          </div> -->
          
          <!-- Meta Information -->
          <div class="card-meta">
            <div class="meta-item">
              <mat-icon>photo_library</mat-icon>
              <span>{{ page.imageCount }} Sayfa</span>
            </div>
            <div class="meta-item">
              <mat-icon>person</mat-icon>
              <span>{{ page.createdByName }}</span>
            </div>
          </div>
          
          <!-- Description -->
          <p class="card-description" *ngIf="page.description">{{ page.description }}</p>
          
          <!-- Action Buttons -->
          <div class="card-buttons">
            <button mat-stroked-button color="primary" (click)="onEdit(page)" class="edit-btn">
              <mat-icon>edit</mat-icon>
              Düzenle
            </button>
            <button mat-icon-button color="warn" (click)="onDelete(page)" [disabled]="deletingId() === page.id" class="delete-btn">
              <mat-icon *ngIf="deletingId() !== page.id">delete</mat-icon>
              <mat-icon *ngIf="deletingId() === page.id" class="loading-icon">hourglass_empty</mat-icon>
            </button>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Pagination Section -->
  <section class="pagination-section">
    <app-pagination
      [currentPage]="pageNumber"
      [totalItems]="pagedStudyPagesSignal().totalCount"
      (pageChanged)="changePage($event)"
    ></app-pagination>
  </section>
</div>
