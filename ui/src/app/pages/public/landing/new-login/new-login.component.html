<div class="profile-authentication-area ptb-140">
    <div class="container">
        <div class="row justify-content-center align-items-center g-5">
            <div class="col-lg-6 col-md-12">
                <div class="profile-authentication-image"><img src="assets/images/login/login.png" alt="image"></div>
            </div>
            <div class="col-lg-6 col-md-12">
                <div class="profile-authentication-inner">
                    <div>
                        <h3>Welcome back!</h3>
                        <p>Your email address will not be published. Required fields are
                            marked *</p>
                    </div>
                    <form>
                        <div class="form-group"><label>Email
                                or Username *</label><input type="text" placeholder="you@example.com"
                                class="form-control"></div>
                        <div class="form-group"><label>Password
                                *</label><input type="password" placeholder="Your password" class="form-control"></div>
                        <div class="options"><label><input type="checkbox">Remember Me</label><a
                                routerlink="/forgot-password" href="/aluno/forgot-password">Forgot password?</a></div>
                        <div class="authentication-btn"><button type="submit" class="default-btn"> Log In <svg
                                    xmlns="http://www.w3.org/2000/svg" width="18" height="14" viewBox="0 0 18 14"
                                    fill="none">
                                    <path opacity="0.5" d="M16.25 6.75V7.25H1.25V6.75H16.25Z" fill="white"
                                        stroke="white"></path>
                                    <path d="M10.75 1L16.75 7L10.75 13" stroke="white" stroke-width="1.5"
                                        stroke-linecap="round" stroke-linejoin="round"></path>
                                </svg></button></div>
                    </form>
                    <div class="bottom-text"><span>Don't
                            have an account? <a routerlink="/register" href="/aluno/register">Create one.</a></span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
