<article class="worksheet-video-card" aria-label="Test karti">
  <a class="thumb" [routerLink]="['/test', course.id]" [attr.aria-label]="course.name + ' testini ac'"
    [style.backgroundImage]="'url(' + backgroundImageUrl() + ')'" [style.backgroundSize]="'cover'"
    [style.backgroundPosition]="'center'" [style.backgroundRepeat]="'no-repeat'">
    <div class="thumb-chips">
      <span class="thumb-chip">{{ course.badgeText || 'Yeni' }}</span>
      <span class="thumb-chip">{{ course.name }}</span>
    </div>
    <span class="thumb-meta">{{ course.questionCount || 0 }} soru</span>
  </a>

  <div class="meta-row">
    <span class="channel-avatar" aria-hidden="true">{{ (course.description || 'T').charAt(0) }}</span>

    <div class="video-content">
      <h3>
        <a [routerLink]="['/test', course.id]">{{ course.description }}</a>
      </h3>

      <!-- <p class="subtitle">{{ course.description || 'Yeni nesil test icerigi' }}</p> -->

      <div class="meta-rating-row">
        <div class="rating-line" aria-label="Puan bilgisi">
          <span class="rating-value">4.9</span>
          <mat-icon>star</mat-icon>
          <mat-icon>star</mat-icon>
          <mat-icon>star</mat-icon>
          <mat-icon>star</mat-icon>
          <mat-icon>star_half</mat-icon>
        </div>

        <p class="meta-line">
          <span>{{ course.instanceCount ?? 0 }} ogrenci</span>
          <span aria-hidden="true">•</span>
          <span>{{ course.questionCount || 0 }} soru</span>
        </p>
      </div>

      <div class="action-row" role="group" aria-label="Kart aksiyonlari">
        <a class="start-btn" [routerLink]="['/test', course.id]">Teste Basla</a>
        <button type="button" class="buy-btn" [attr.aria-label]="'Satin al'">Satin Al</button>
      </div>
    </div>

    <button type="button" class="menu-btn" [attr.aria-label]="'Kart menusu'">
      <mat-icon>more_vert</mat-icon>
    </button>
  </div>
</article>
