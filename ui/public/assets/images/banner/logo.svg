<svg width="168" height="44" viewBox="0 0 168 44" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Icon: rounded square with target -->
  <rect x="0" y="2" width="40" height="40" rx="10" fill="url(#iconGrad)"/>
  <!-- Outer ring -->
  <circle cx="20" cy="22" r="13" stroke="white" stroke-width="1.4" fill="none" opacity="0.45"/>
  <!-- Mid ring -->
  <circle cx="20" cy="22" r="8" stroke="white" stroke-width="1.4" fill="none" opacity="0.7"/>
  <!-- Center dot -->
  <circle cx="20" cy="22" r="3.5" fill="white"/>
  <!-- Arrow from top-right pointing at center -->
  <line x1="30" y1="10" x2="23" y2="18" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <polyline points="30,10 26.5,10 30,10 30,14" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- "Hedef" text -->
  <text x="50" y="30" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="21" font-weight="800" fill="#1a1a2e" letter-spacing="-0.3">Hedef</text>
  <!-- "Okul" text in purple -->
  <text x="111" y="30" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="21" font-weight="800" fill="#6438c3" letter-spacing="-0.3">Okul</text>

  <defs>
    <linearGradient id="iconGrad" x1="0" y1="2" x2="40" y2="42" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7c4fe0"/>
      <stop offset="1" stop-color="#4f2fa4"/>
    </linearGradient>
  </defs>
</svg>
