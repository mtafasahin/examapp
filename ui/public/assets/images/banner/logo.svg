<svg width="168" height="44" viewBox="0 0 168 44" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Icon background -->
  <rect x="0" y="2" width="40" height="40" rx="10" fill="url(#iconGrad)"/>

  <!-- Concentric rings — center: 20,22 -->
  <circle cx="20" cy="22" r="13"  stroke="white" stroke-width="1.5" fill="none" opacity="0.3"/>
  <circle cx="20" cy="22" r="8.5" stroke="white" stroke-width="1.5" fill="none" opacity="0.55"/>
  <circle cx="20" cy="22" r="4"   stroke="white" stroke-width="1.5" fill="none" opacity="0.85"/>
  <!-- Bullseye center dot -->
  <circle cx="20" cy="22" r="2" fill="white" opacity="0.95"/>

  <!-- Wordmark -->
  <text x="50" y="30"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="21" font-weight="800" fill="#1a1a2e" letter-spacing="-0.3">Hedef</text>
  <text x="111" y="30"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="21" font-weight="800" fill="#6438c3" letter-spacing="-0.3">Okul</text>

  <defs>
    <linearGradient id="iconGrad" x1="0" y1="2" x2="40" y2="42" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7c4fe0"/>
      <stop offset="1" stop-color="#4f2fa4"/>
    </linearGradient>
  </defs>
</svg>
