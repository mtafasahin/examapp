<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" fill="none">
  <!-- Background circle -->
  <circle cx="240" cy="240" r="220" fill="#f0ebff"/>

  <!-- Clipboard / form -->
  <rect x="155" y="140" width="170" height="210" rx="12" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
  <rect x="195" y="128" width="90" height="24" rx="8" fill="#6438c3"/>
  <!-- Form lines -->
  <rect x="175" y="180" width="130" height="10" rx="5" fill="#e5e7eb"/>
  <rect x="175" y="204" width="100" height="10" rx="5" fill="#e5e7eb"/>
  <rect x="175" y="228" width="130" height="10" rx="5" fill="#e5e7eb"/>
  <rect x="175" y="252" width="90" height="10" rx="5" fill="#e5e7eb"/>
  <!-- Submit button on clipboard -->
  <rect x="175" y="278" width="130" height="32" rx="8" fill="#6438c3"/>
  <rect x="195" y="288" width="90" height="12" rx="3" fill="#a78bfa"/>

  <!-- Checkmark badge -->
  <circle cx="340" cy="180" r="30" fill="#6438c3"/>
  <polyline points="326,180 335,190 355,170" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Person -->
  <circle cx="116" cy="200" r="28" fill="#fde8d8"/>
  <rect x="92" y="226" width="48" height="50" rx="10" fill="#8b5cf6"/>
  <!-- arms -->
  <rect x="70" y="232" width="26" height="12" rx="6" fill="#8b5cf6" transform="rotate(-15 83 238)"/>
  <rect x="140" y="232" width="26" height="12" rx="6" fill="#8b5cf6" transform="rotate(15 153 238)"/>
  <!-- legs -->
  <rect x="100" y="273" width="14" height="32" rx="6" fill="#6438c3"/>
  <rect x="118" y="273" width="14" height="32" rx="6" fill="#6438c3"/>

  <!-- Star decorations -->
  <circle cx="370" cy="280" r="7" fill="#fbbf24"/>
  <circle cx="130" cy="350" r="5" fill="#a78bfa"/>
  <circle cx="370" cy="140" r="5" fill="#fbbf24"/>
  <circle cx="200" cy="380" r="6" fill="#6438c3" opacity="0.4"/>

  <!-- Pencil -->
  <rect x="348" y="300" width="10" height="72" rx="4" fill="#fbbf24" transform="rotate(-25 353 336)"/>
  <polygon points="354,368 346,368 350,382" fill="#f59e0b" transform="rotate(-25 350 375)"/>
  <rect x="348" y="300" width="10" height="14" rx="2" fill="#f87171" transform="rotate(-25 353 307)"/>
</svg>
