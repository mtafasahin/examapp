server {
    listen 4200;
    server_name _;

    root /usr/share/nginx/html;
    index index.html index.csr.html;

    # SPA fallback
    # With Angular SSR outputMode=static, CSR shell is index.csr.html.
    # Plain SPA builds use index.html. Support both.
    location / {
        try_files $uri $uri/ /index.csr.html /index.html =404;
    }

    # Basic caching for assets
    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
}
