server {
    listen 4200;
    server_name _;

    root /usr/share/nginx/html;
    index index.html index.csr.html;

    # SPA fallback
    # $uri/index.html  → SSR prerender rotaları için (welcome/index.html, privacy-policy/index.html)
    # $uri             → static dosyalar
    # /index.csr.html  → SSR (ui) SPA shell
    # /index.html      → plain SPA (auth-ui) shell
    # =404 ile sonsuz döngü engellenir
    location / {
        try_files $uri $uri/index.html /index.csr.html /index.html =404;
    }

    # Basic caching for assets
    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
}
