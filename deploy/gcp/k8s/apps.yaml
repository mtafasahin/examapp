apiVersion: apps/v1
kind: Deployment
metadata:
  name: exam-dotnet-api
  namespace: examapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: exam-dotnet-api
  template:
    metadata:
      labels:
        app: exam-dotnet-api
    spec:
      containers:
        - name: exam-dotnet-api
          image: REPLACE_IMAGE/exam-dotnet-api:latest
          ports:
            - containerPort: 5079
          env:
            - name: ASPNETCORE_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: examapp-config
                  key: ASPNETCORE_ENVIRONMENT
            - name: ASPNETCORE_URLS
              value: http://+:5079
            - name: ConnectionStrings__DefaultConnection
              valueFrom:
                secretKeyRef:
                  name: examapp-secrets
                  key: CONNECTIONSTRINGS_EXAM
            - name: AuthApiBaseUrl
              valueFrom:
                configMapKeyRef:
                  name: examapp-config
                  key: AUTH_API_BASE_URL
            - name: Jwt__Key
              valueFrom:
                secretKeyRef:
                  name: examapp-secrets
                  key: JWT_KEY
            - name: Server__BaseUrl
              valueFrom:
                configMapKeyRef:
                  name: examapp-config
                  key: PUBLIC_BASE_URL
            - name: MinioConfig__Endpoint
              valueFrom:
                configMapKeyRef:
                  name: examapp-config
                  key: MINIO_ENDPOINT
            - name: MinioConfig__AccessKey
              valueFrom:
                secretKeyRef:
                  name: examapp-secrets
                  key: MINIO_ROOT_USER
            - name: MinioConfig__SecretKey
              valueFrom:
                secretKeyRef:
                  name: examapp-secrets
                  key: MINIO_ROOT_PASSWORD
            - name: MinioConfig__BaseUrl
              valueFrom:
                configMapKeyRef:
                  name: examapp-config
                  key: MINIO_BASE_URL
            - name: Redis__Configuration
              valueFrom:
                secretKeyRef:
                  name: examapp-secrets
                  key: REDIS_CONNECTION
            - name: Redis__Password
              valueFrom:
                secretKeyRef:
                  name: examapp-secrets
                  key: REDIS_PASSWORD
            - name: Keycloak__Host
              valueFrom:
                configMapKeyRef:
                  name: examapp-config
                  key: KEYCLOAK_HOST_INTERNAL
            - name: Keycloak__Realm
              valueFrom:
                configMapKeyRef:
                  name: examapp-config
                  key: KEYCLOAK_REALM
            - name: Keycloak__Authority
              valueFrom:
                configMapKeyRef:
                  name: examapp-config
                  key: KEYCLOAK_AUTHORITY
            - name: Keycloak__ClientId
              valueFrom:
                secretKeyRef:
                  name: examapp-secrets
                  key: KEYCLOAK_CLIENT_ID
            - name: Keycloak__ClientSecret
              valueFrom:
                secretKeyRef:
                  name: examapp-secrets
                  key: KEYCLOAK_CLIENT_SECRET
            - name: Keycloak__AdminClientId
              valueFrom:
                secretKeyRef:
                  name: examapp-secrets
                  key: KEYCLOAK_ADMIN_CLIENT_ID
            - name: Keycloak__AdminClientSecret
              valueFrom:
                secretKeyRef:
                  name: examapp-secrets
                  key: KEYCLOAK_ADMIN_CLIENT_SECRET
            - name: Keycloak__TokenUrl
              value: realms/exam-realm/protocol/openid-connect/token
            - name: Keycloak__RealmRolesUrl
              value: admin/realms/exam-realm/roles
---
apiVersion: v1
kind: Service
metadata:
  name: exam-dotnet-api
  namespace: examapp
spec:
  selector:
    app: exam-dotnet-api
  ports:
    - name: http
      port: 5079
      targetPort: 5079

---
