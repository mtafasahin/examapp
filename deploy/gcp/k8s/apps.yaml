apiVersion: apps/v1
kind: Deployment
metadata:
  name: ocelot-gateway
  namespace: examapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ocelot-gateway
  template:
    metadata:
      labels:
        app: ocelot-gateway
    spec:
      containers:
        - name: ocelot-gateway
          image: REPLACE_IMAGE/ocelot-gateway:latest
          ports:
            - containerPort: 5678
          env:
            - name: ASPNETCORE_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: examapp-config
                  key: ASPNETCORE_ENVIRONMENT
            - name: Kestrel__Port
              value: '5678'
            - name: Server__BaseUrl
              valueFrom:
                configMapKeyRef:
                  name: examapp-config
                  key: PUBLIC_BASE_URL
            - name: Keycloak__Realm
              valueFrom:
                configMapKeyRef:
                  name: examapp-config
                  key: KEYCLOAK_REALM
            - name: Keycloak__ClientCallbackUrl
              valueFrom:
                configMapKeyRef:
                  name: examapp-config
                  key: KEYCLOAK_CLIENT_CALLBACK_URL
            - name: Cors__AllowedOrigins__0
              valueFrom:
                configMapKeyRef:
                  name: examapp-config
                  key: CORS_ALLOWED_ORIGIN_0
            - name: Keycloak__Host
              valueFrom:
                configMapKeyRef:
                  name: examapp-config
                  key: KEYCLOAK_HOST_INTERNAL
---
apiVersion: v1
kind: Service
metadata:
  name: ocelot-gateway
  namespace: examapp
  annotations:
    cloud.google.com/neg: '{"ingress": true}'
    cloud.google.com/backend-config: '{"ports":{"5678":"ocelot-gateway-backendconfig"}}'
    beta.cloud.google.com/backend-config: '{"ports":{"5678":"ocelot-gateway-backendconfig"}}'
spec:
  selector:
    app: ocelot-gateway
  ports:
    - name: http
      port: 5678
      targetPort: 5678
